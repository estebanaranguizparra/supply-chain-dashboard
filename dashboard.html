<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Chain Decision Toolkit - Dashboard</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 24px; color: #1a1a1a; background:#fafafa; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  p.sub { color: #666; font-size: 13px; margin-top:0; margin-bottom: 24px; }
  #setup { background:#fff; border:1px solid #ddd; border-radius:10px; padding:20px; margin-bottom:24px; }
  #setup input { width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; font-size:14px; box-sizing:border-box; }
  #setup button, #reload { padding:8px 16px; border-radius:6px; border:1px solid #1a1a1a; background:#1a1a1a; color:#fff; cursor:pointer; font-size:14px; margin-top:8px; }
  #status { font-size:13px; color:#a33; margin-top:8px; line-height:1.5; }
  #status b { color:#7a1f1f; }
  select { padding:6px 10px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
  .filters { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:16px; }
  .card .label { font-size:13px; color:#666; margin-bottom:6px; }
  .card .value { font-size:26px; font-weight:600; }
  #chartWrap { position:relative; width:100%; height:320px; background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:16px; box-sizing:border-box; }
  #chart { cursor:pointer; }
  .chart-caption { font-size:12px; color:#777; margin:0 0 8px 0; }
  .focus-banner { grid-column:1/-1; font-size:13px; color:#333; margin-bottom:2px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .focus-banner a { color:#1a56db; cursor:pointer; text-decoration:underline; }
  #execSummary { background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:18px 20px; margin-top:24px; }
  #execSummary h2 { font-size:15px; font-weight:600; margin:0 0 12px 0; }
  #execSummary ol { margin:0; padding-left:20px; }
  #execSummary li { margin-bottom:14px; font-size:14px; line-height:1.5; }
  #execSummary li:last-child { margin-bottom:0; }
  #execSummary .action { margin-top:4px; padding-left:2px; font-size:13px; color:#555; }
  #execSummary .action b { color:#333; }
  #dash { display:none; }
</style>
</head>
<body>

<h1>Supply Chain Decision Toolkit — Dashboard</h1>
<p class="sub">Datos leidos directamente desde tu Google Sheet publicado.</p>

<div id="setup">
  <label for="sheetUrl" style="font-size:13px; color:#333; display:block; margin-bottom:6px;">
    URL del CSV publicado de tu Google Sheet
  </label>
  <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" />
  <button onclick="saveAndLoad()">Conectar</button>
  <div id="status"></div>
</div>

<div id="dash">
  <div class="filters">
    <select id="fProv"></select>
    <select id="fCat"></select>
    <button id="reload" onclick="loadData()">Actualizar datos</button>
  </div>
  <div class="cards" id="cards"></div>
  <p class="chart-caption" id="chartCaption"></p>
  <div id="chartWrap"><canvas id="chart"></canvas></div>
  <div id="execSummary">
    <h2 id="execTitle">Resumen ejecutivo — Top 5 prioridades de la semana</h2>
    <ol id="execList"></ol>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const STATUS_COLOR = { good: '#0ca30c', warn: '#d99000', bad: '#d03b3b' };
let chart, data = [], selectedSku = null, lastRows = [];

function getSheetUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('sheet') || localStorage.getItem('sheetUrl') || '';
}

function saveAndLoad() {
  const url = document.getElementById('sheetUrl').value.trim();
  if (!url) return;
  localStorage.setItem('sheetUrl', url);
  loadData();
}

function num(v, fallback) {
  const n = parseFloat(v);
  if (isNaN(n)) return fallback;
  return n > 1.5 ? n / 100 : n; // acepta 92 o 0.92
}

const REQUIRED_COLUMNS = ['SKU', 'Proveedor', 'OTIF', 'Forecast Accuracy', 'Backorders', 'Supplier OTD'];

function missingColumns(fields) {
  const present = new Set((fields || []).map(f => (f || '').trim()));
  return REQUIRED_COLUMNS.filter(c => !present.has(c));
}

function loadData() {
  const url = getSheetUrl();
  const statusEl = document.getElementById('status');
  if (!url) { statusEl.textContent = ''; return; }

  document.getElementById('sheetUrl').value = url;
  statusEl.textContent = 'Cargando...';

  Papa.parse(url, {
    download: true,
    header: true,
    complete: function(results) {
      const missing = missingColumns(results.meta && results.meta.fields);
      if (missing.length) {
        statusEl.innerHTML = `No se pudo cargar el dashboard: faltan las columnas <b>${missing.join(', ')}</b> en tu Google Sheet.<br>Revisa que los encabezados sean exactamente: <b>SKU, Categoria, Proveedor, Critico, OTIF, Forecast Accuracy, Backorders, Supplier OTD</b> (Categoria y Critico son opcionales, el resto obligatorias).`;
        document.getElementById('dash').style.display = 'none';
        return;
      }
      const rows = results.data.filter(r => r.SKU);
      if (!rows.length) {
        statusEl.textContent = 'No se encontraron filas. Revisa que el link sea el CSV publicado (Archivo > Compartir > Publicar en la web > CSV).';
        document.getElementById('dash').style.display = 'none';
        return;
      }
      data = rows.map(r => ({
        sku: r.SKU,
        categoria: r.Categoria || 'General',
        proveedor: r.Proveedor,
        critico: r.Critico || 'No',
        otif: num(r.OTIF, 0),
        forecast_accuracy: num(r['Forecast Accuracy'], 0),
        backorders: num(r.Backorders, 0),
        supplier_otd: num(r['Supplier OTD'], 0),
      }));
      statusEl.textContent = '';
      document.getElementById('dash').style.display = 'block';
      buildFilters();
      render();
    },
    error: function(err) {
      statusEl.textContent = 'No se pudo leer el archivo. Verifica que el link sea publico (CSV).';
      document.getElementById('dash').style.display = 'none';
    }
  });
}

function unique(arr) { return [...new Set(arr)].filter(Boolean).sort(); }

function buildFilters() {
  const provSel = document.getElementById('fProv');
  const catSel = document.getElementById('fCat');
  provSel.innerHTML = '';
  catSel.innerHTML = '';
  [['Todos los proveedores', '']].concat(unique(data.map(d => d.proveedor)).map(p => [p, p])).forEach(([label, val]) => {
    const o = document.createElement('option'); o.value = val; o.textContent = label; provSel.appendChild(o);
  });
  [['Todas las categorias', '']].concat(unique(data.map(d => d.categoria)).map(c => [c, c])).forEach(([label, val]) => {
    const o = document.createElement('option'); o.value = val; o.textContent = label; catSel.appendChild(o);
  });
  provSel.onchange = render;
  catSel.onchange = render;
}

function pctFmt(v) { return Math.round(v * 1000) / 10 + '%'; }
function scoreOf(d) { return (1 - d.otif) * 35 + (1 - d.forecast_accuracy) * 25 + d.backorders * 25 + (1 - d.supplier_otd) * 15; }
function kpiState(key, v) {
  const th = { otif: [0.90, 0.95], forecast_accuracy: [0.70, 0.75], supplier_otd: [0.85, 0.95] };
  if (key === 'backorders') return v > 0.10 ? 'bad' : (v > 0.05 ? 'warn' : 'good');
  const [c, s] = th[key];
  return v < c ? 'bad' : (v < s ? 'warn' : 'good');
}

function avgBy(rows, groupKey, valueKey) {
  const groups = {};
  rows.forEach(r => {
    const g = r[groupKey] || 'N/A';
    (groups[g] = groups[g] || []).push(r[valueKey]);
  });
  return Object.entries(groups).map(([group, vals]) => ({
    group,
    avg: vals.reduce((s, v) => s + v, 0) / vals.length,
    n: vals.length
  }));
}

function buildExecSummary(rows) {
  const items = [];
  if (!rows.length) return items;

  const ranked = rows.map(d => ({ ...d, score: scoreOf(d) })).sort((a, b) => b.score - a.score);

  // 1. SKU con mayor score de urgencia
  const top = ranked[0];
  items.push({
    text: `Priorizar <strong>${top.sku}</strong> (Proveedor ${top.proveedor}): OTIF ${pctFmt(top.otif)}, backorders ${pctFmt(top.backorders)}, forecast accuracy ${pctFmt(top.forecast_accuracy)} — el SKU con mayor score de urgencia.`,
    action: `Revisar el inventario disponible de <b>${top.sku}</b> y confirmar con <b>${top.proveedor}</b> la fecha de la próxima entrega; si el backorder persiste, evaluar una fuente alternativa a corto plazo.`
  });

  // 2. SKU crítico con backorders sobre el umbral
  const criticos = rows.filter(d => d.critico === 'Si' && d.backorders > 0.10).sort((a, b) => b.backorders - a.backorders);
  const critico = criticos.find(c => c.sku !== top.sku) || criticos[0];
  if (critico) {
    items.push({
      text: `Revisar disponibilidad del SKU crítico <strong>${critico.sku}</strong> (Proveedor ${critico.proveedor}): backorders en ${pctFmt(critico.backorders)}, muy por encima del umbral de 10%.`,
      action: `Escalar el pedido pendiente de <b>${critico.sku}</b> con <b>${critico.proveedor}</b> solicitando fecha de expedite, e informar a ventas el posible impacto en el compromiso de entrega.`
    });
  } else {
    items.push({
      text: `No hay SKUs marcados como críticos con backorders sobre el 10%; mantener el monitoreo habitual de los productos críticos.`,
      action: `No se requiere acción inmediata; continuar con la revisión semanal de SKUs críticos.`
    });
  }

  // 3. Proveedor con peor OTD promedio
  const bySupplier = avgBy(rows, 'proveedor', 'supplier_otd').sort((a, b) => a.avg - b.avg);
  if (bySupplier.length) {
    const s = bySupplier[0];
    items.push({
      text: `Escalar con <strong>${s.group}</strong>: OTD promedio de ${pctFmt(s.avg)} en ${s.n} SKU(s), por debajo del objetivo de 95%.`,
      action: `Agendar una reunión de desempeño con <b>${s.group}</b> esta semana, revisar las causas del incumplimiento y definir un plan de mejora con fecha de seguimiento.`
    });
  }

  // 4. Categoría con peor forecast accuracy promedio
  const byCategory = avgBy(rows, 'categoria', 'forecast_accuracy').sort((a, b) => a.avg - b.avg);
  if (byCategory.length) {
    const c = byCategory[0];
    items.push({
      text: `Revisar el proceso de forecast en la categoría <strong>${c.group}</strong>: precisión promedio de ${pctFmt(c.avg)}, por debajo del objetivo de 75%.`,
      action: `Revisar con el equipo comercial los supuestos de demanda de <b>${c.group}</b> y ajustar el modelo o la frecuencia de revisión del forecast.`
    });
  }

  // 5. KPI general más alejado de su objetivo
  const avgOf = key => rows.reduce((s, d) => s + d[key], 0) / rows.length;
  const gaps = [
    { label: 'OTIF', value: avgOf('otif'), gap: 0.95 - avgOf('otif'), target: '95%' },
    { label: 'Forecast accuracy', value: avgOf('forecast_accuracy'), gap: 0.75 - avgOf('forecast_accuracy'), target: '75%' },
    { label: 'Supplier OTD', value: avgOf('supplier_otd'), gap: 0.95 - avgOf('supplier_otd'), target: '95%' },
    { label: 'Backorders', value: avgOf('backorders'), gap: avgOf('backorders') - 0.05, target: '5%' },
  ].sort((a, b) => b.gap - a.gap);
  const worst = gaps[0];
  if (worst.gap > 0) {
    items.push({
      text: `A nivel general, <strong>${worst.label}</strong> está en ${pctFmt(worst.value)}, fuera del objetivo de ${worst.target}. Priorizar acciones que mejoren este indicador esta semana.`,
      action: `Definir un responsable y una meta semanal de mejora para <b>${worst.label}</b>, y dar seguimiento en la próxima reunión de S&OP.`
    });
  } else {
    items.push({
      text: `Todos los KPIs generales (OTIF, forecast accuracy, backorders, supplier OTD) están dentro de rango saludable. Mantener el monitoreo semanal.`,
      action: `No se requiere acción correctiva; continuar con el monitoreo semanal habitual.`
    });
  }

  return items.slice(0, 5);
}

function buildSkuSummary(row) {
  const metrics = [
    { key: 'otif', label: 'OTIF', target: '95%', weight: (1 - row.otif) * 35 },
    { key: 'forecast_accuracy', label: 'Forecast accuracy', target: '75%', weight: (1 - row.forecast_accuracy) * 25 },
    { key: 'backorders', label: 'Backorders', target: '5%', weight: row.backorders * 25 },
    { key: 'supplier_otd', label: 'Supplier OTD', target: '95%', weight: (1 - row.supplier_otd) * 15 },
  ].map(m => ({ ...m, state: kpiState(m.key, row[m.key]), value: row[m.key] }));

  const actionFor = (m) => {
    switch (m.key) {
      case 'otif': return `Revisar si el problema de OTIF en <b>${row.sku}</b> es de disponibilidad (inventario) o de cumplimiento logístico (transporte/despacho), y coordinar con <b>${row.proveedor}</b> según corresponda.`;
      case 'forecast_accuracy': return `Revisar con el equipo comercial los supuestos de demanda usados para planificar <b>${row.sku}</b> y ajustar el forecast.`;
      case 'backorders': return `Contactar a <b>${row.proveedor}</b> para acelerar el pedido pendiente de <b>${row.sku}</b>; evaluar una fuente alternativa si el backorder persiste.`;
      case 'supplier_otd': return `Escalar con <b>${row.proveedor}</b> el cumplimiento de plazos de entrega de <b>${row.sku}</b> y solicitar un plan de mejora.`;
    }
  };

  const issues = metrics.filter(m => m.state !== 'good').sort((a, b) => b.weight - a.weight);
  const items = issues.map(m => ({
    text: `<strong>${m.label}</strong> en ${pctFmt(m.value)}, ${m.key === 'backorders' ? 'por encima' : 'por debajo'} del objetivo de ${m.target}.`,
    action: actionFor(m)
  }));

  if (row.critico === 'Si') {
    items.unshift({
      text: `<strong>${row.sku}</strong> está marcado como SKU crítico — cualquier quiebre de stock tiene alto impacto en el servicio.`,
      action: `Priorizar la reposición de <b>${row.sku}</b> por sobre SKUs no críticos con score de urgencia similar.`
    });
  }

  if (!items.length) {
    items.push({
      text: `<strong>${row.sku}</strong> (Proveedor ${row.proveedor}) está dentro de rango saludable en sus 4 KPIs.`,
      action: `No se requiere acción correctiva; mantener el monitoreo habitual.`
    });
  }

  return items.slice(0, 5);
}

function renderExecSummary(rows) {
  const execListEl = document.getElementById('execList');
  const titleEl = document.getElementById('execTitle');
  const focusRow = selectedSku ? rows.find(d => d.sku === selectedSku) : null;
  const list = focusRow ? buildSkuSummary(focusRow) : buildExecSummary(rows);
  titleEl.textContent = focusRow
    ? `Plan de acción — ${focusRow.sku} (Proveedor ${focusRow.proveedor})`
    : 'Resumen ejecutivo — Top 5 prioridades de la semana';
  execListEl.innerHTML = list.map(it => `<li>${it.text}<div class="action">➜ <b>Acción:</b> ${it.action}</div></li>`).join('');
}

function renderCards(rows) {
  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  const focusRow = selectedSku ? rows.find(d => d.sku === selectedSku) : null;

  if (focusRow) {
    const banner = document.createElement('div');
    banner.className = 'focus-banner';
    banner.innerHTML = `Mostrando <strong>${focusRow.sku}</strong> (Proveedor ${focusRow.proveedor}) — <a id="clearFocus">Ver promedio general</a>`;
    cardsEl.appendChild(banner);
  }

  [['otif', 'OTIF'], ['forecast_accuracy', 'Forecast accuracy'], ['backorders', 'Backorders'], ['supplier_otd', 'Supplier OTD']].forEach(([key, label]) => {
    const val = focusRow ? focusRow[key] : (rows.length ? rows.reduce((s, d) => s + d[key], 0) / rows.length : 0);
    const st = (focusRow || rows.length) ? kpiState(key, val) : 'good';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="label">${label}</div><div class="value" style="color:${STATUS_COLOR[st]}">${pctFmt(val)}</div>`;
    cardsEl.appendChild(card);
  });

  if (focusRow) {
    document.getElementById('clearFocus').onclick = () => {
      selectedSku = null;
      renderCards(lastRows);
      renderExecSummary(lastRows);
      updateChartHighlight();
    };
  }
}

function updateChartHighlight() {
  if (!chart) return;
  chart.data.datasets[0].borderColor = chart.data.labels.map(l => l === selectedSku ? '#1a1a1a' : 'transparent');
  chart.data.datasets[0].borderWidth = chart.data.labels.map(l => l === selectedSku ? 3 : 0);
  chart.update();
}

function render() {
  const prov = document.getElementById('fProv').value;
  const cat = document.getElementById('fCat').value;
  const rows = data.filter(d => (!prov || d.proveedor === prov) && (!cat || d.categoria === cat));
  lastRows = rows;
  selectedSku = null;

  renderExecSummary(rows);
  renderCards(rows);

  const captionEl = document.getElementById('chartCaption');
  captionEl.textContent = rows.length
    ? `Mostrando los ${Math.min(10, rows.length)} SKU con mayor urgencia de ${rows.length} en total.`
    : '';

  const ranked = rows.map(d => ({ ...d, score: scoreOf(d) })).sort((a, b) => b.score - a.score).slice(0, 10);
  const labels = ranked.map(d => d.sku);
  const scores = ranked.map(d => Math.round(d.score * 100) / 100);
  // Color por severidad relativa dentro del top 10 mostrado, para que la barra
  // más alta (mayor urgencia) siempre sea la más "roja". Los SKU críticos con
  // backorders sobre 10% se marcan en rojo sin importar su posición.
  const colors = ranked.map((d, i) => {
    if (d.critico === 'Si' && d.backorders > 0.10) return STATUS_COLOR.bad;
    if (i < 3) return STATUS_COLOR.bad;
    if (i < 7) return STATUS_COLOR.warn;
    return STATUS_COLOR.good;
  });

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Score de urgencia', data: scores, backgroundColor: colors, borderRadius: 4, borderWidth: 0 }] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const sku = labels[elements[0].index];
        selectedSku = (selectedSku === sku) ? null : sku;
        renderCards(lastRows);
        renderExecSummary(lastRows);
        updateChartHighlight();
      }
    }
  });
}

document.getElementById('sheetUrl').value = getSheetUrl();
if (getSheetUrl()) loadData();
</script>
</body>
</html>
