<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Chain Decision Toolkit - Dashboard</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 24px; color: #1a1a1a; background:#fafafa; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  p.sub { color: #666; font-size: 13px; margin-top:0; margin-bottom: 24px; }
  #setup { background:#fff; border:1px solid #ddd; border-radius:10px; padding:20px; margin-bottom:24px; }
  #setup input { width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; font-size:14px; box-sizing:border-box; }
  #setup button, #reload { padding:8px 16px; border-radius:6px; border:1px solid #1a1a1a; background:#1a1a1a; color:#fff; cursor:pointer; font-size:14px; margin-top:8px; }
  #status { font-size:13px; color:#a33; margin-top:8px; }
  select { padding:6px 10px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
  .filters { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:16px; }
  .card .label { font-size:13px; color:#666; margin-bottom:6px; }
  .card .value { font-size:26px; font-weight:600; }
  #chartWrap { position:relative; width:100%; height:320px; background:#fff; border:1px solid #e5e5e5; border-radius:10px; padding:16px; box-sizing:border-box; }
  #dash { display:none; }
</style>
</head>
<body>

<h1>Supply Chain Decision Toolkit — Dashboard</h1>
<p class="sub">Datos leidos directamente desde tu Google Sheet publicado.</p>

<div id="setup">
  <label for="sheetUrl" style="font-size:13px; color:#333; display:block; margin-bottom:6px;">
    URL del CSV publicado de tu Google Sheet
  </label>
  <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/e/.../pub?output=csv" />
  <button onclick="saveAndLoad()">Conectar</button>
  <div id="status"></div>
</div>

<div id="dash">
  <div class="filters">
    <select id="fProv"></select>
    <select id="fCat"></select>
    <button id="reload" onclick="loadData()">Actualizar datos</button>
  </div>
  <div class="cards" id="cards"></div>
  <div id="chartWrap"><canvas id="chart"></canvas></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const STATUS_COLOR = { good: '#0ca30c', warn: '#d99000', bad: '#d03b3b' };
let chart, data = [];

function getSheetUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('sheet') || localStorage.getItem('sheetUrl') || '';
}

function saveAndLoad() {
  const url = document.getElementById('sheetUrl').value.trim();
  if (!url) return;
  localStorage.setItem('sheetUrl', url);
  loadData();
}

function num(v, fallback) {
  const n = parseFloat(v);
  if (isNaN(n)) return fallback;
  return n > 1.5 ? n / 100 : n; // acepta 92 o 0.92
}

function loadData() {
  const url = getSheetUrl();
  const statusEl = document.getElementById('status');
  if (!url) { statusEl.textContent = ''; return; }

  document.getElementById('sheetUrl').value = url;
  statusEl.textContent = 'Cargando...';

  Papa.parse(url, {
    download: true,
    header: true,
    complete: function(results) {
      const rows = results.data.filter(r => r.SKU);
      if (!rows.length) {
        statusEl.textContent = 'No se encontraron filas. Revisa que el link sea el CSV publicado (Archivo > Compartir > Publicar en la web > CSV).';
        return;
      }
      data = rows.map(r => ({
        sku: r.SKU,
        categoria: r.Categoria || 'General',
        proveedor: r.Proveedor,
        critico: r.Critico || 'No',
        otif: num(r.OTIF, 0),
        forecast_accuracy: num(r['Forecast Accuracy'], 0),
        backorders: num(r.Backorders, 0),
        supplier_otd: num(r['Supplier OTD'], 0),
      }));
      statusEl.textContent = '';
      document.getElementById('dash').style.display = 'block';
      buildFilters();
      render();
    },
    error: function(err) {
      statusEl.textContent = 'No se pudo leer el archivo. Verifica que el link sea publico (CSV).';
    }
  });
}

function unique(arr) { return [...new Set(arr)].filter(Boolean).sort(); }

function buildFilters() {
  const provSel = document.getElementById('fProv');
  const catSel = document.getElementById('fCat');
  provSel.innerHTML = '';
  catSel.innerHTML = '';
  [['Todos los proveedores', '']].concat(unique(data.map(d => d.proveedor)).map(p => [p, p])).forEach(([label, val]) => {
    const o = document.createElement('option'); o.value = val; o.textContent = label; provSel.appendChild(o);
  });
  [['Todas las categorias', '']].concat(unique(data.map(d => d.categoria)).map(c => [c, c])).forEach(([label, val]) => {
    const o = document.createElement('option'); o.value = val; o.textContent = label; catSel.appendChild(o);
  });
  provSel.onchange = render;
  catSel.onchange = render;
}

function pctFmt(v) { return Math.round(v * 1000) / 10 + '%'; }
function scoreOf(d) { return (1 - d.otif) * 35 + (1 - d.forecast_accuracy) * 25 + d.backorders * 25 + (1 - d.supplier_otd) * 15; }
function kpiState(key, v) {
  const th = { otif: [0.90, 0.95], forecast_accuracy: [0.70, 0.75], supplier_otd: [0.85, 0.95] };
  if (key === 'backorders') return v > 0.10 ? 'bad' : (v > 0.05 ? 'warn' : 'good');
  const [c, s] = th[key];
  return v < c ? 'bad' : (v < s ? 'warn' : 'good');
}

function render() {
  const prov = document.getElementById('fProv').value;
  const cat = document.getElementById('fCat').value;
  const rows = data.filter(d => (!prov || d.proveedor === prov) && (!cat || d.categoria === cat));

  const cardsEl = document.getElementById('cards');
  cardsEl.innerHTML = '';
  [['otif', 'OTIF'], ['forecast_accuracy', 'Forecast accuracy'], ['backorders', 'Backorders'], ['supplier_otd', 'Supplier OTD']].forEach(([key, label]) => {
    const avg = rows.length ? rows.reduce((s, d) => s + d[key], 0) / rows.length : 0;
    const st = rows.length ? kpiState(key, avg) : 'good';
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="label">${label}</div><div class="value" style="color:${STATUS_COLOR[st]}">${pctFmt(avg)}</div>`;
    cardsEl.appendChild(card);
  });

  const ranked = rows.map(d => ({ ...d, score: scoreOf(d) })).sort((a, b) => b.score - a.score).slice(0, 10);
  const labels = ranked.map(d => d.sku);
  const scores = ranked.map(d => Math.round(d.score * 100) / 100);
  const colors = ranked.map(d => (d.critico === 'Si' && d.backorders > 0.10) ? STATUS_COLOR.bad : (d.score > 25 ? STATUS_COLOR.warn : STATUS_COLOR.good));

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Score de urgencia', data: scores, backgroundColor: colors, borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

document.getElementById('sheetUrl').value = getSheetUrl();
if (getSheetUrl()) loadData();
</script>
</body>
</html>
